<style>
:root{--sch-blue:#003d8f;--sch-dark:#082f68;--sch-sky:#00a6d6;--white:#fff;--ink:#162033;--muted:#667085;--line:rgba(255,255,255,.26);--shadow:0 24px 70px rgba(7,28,61,.28)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Pretendard,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;color:#fff;background:#10213c}a{color:inherit;text-decoration:none}.intro{position:relative;display:grid;grid-template-columns:minmax(620px,1fr) 430px;align-items:center;gap:56px;min-height:100vh;overflow:hidden;padding:36px 42px 48px;background-image:linear-gradient(90deg,rgba(5,28,62,.78) 0%,rgba(5,28,62,.46) 34%,rgba(5,28,62,.18) 62%,rgba(5,28,62,.38) 100%),linear-gradient(180deg,rgba(7,23,48,.14),rgba(7,23,48,.35)),url("./gumi-hospital-main.jpg");background-size:cover;background-position:center}.intro:after{content:"";position:absolute;inset:auto 0 0;height:34%;background:linear-gradient(180deg,rgba(9,25,52,0),rgba(9,25,52,.54));pointer-events:none}.brand{position:relative;z-index:2;align-self:start;max-width:760px}.logo-row{display:flex;align-items:center;margin-bottom:116px}.brand-logo{display:block;width:414px;height:auto}.slogan{margin:0 0 0 88px;font-family:"KoPub Dotum Light","KoPubWorldDotum Light","KoPub돋움 Light","KoPub돋움체 Light","Noto Sans KR","Malgun Gothic",sans-serif;font-size:41px;font-weight:300;line-height:1.06;color:rgba(255,255,255,.98);word-break:keep-all;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;text-shadow:0 2px 8px rgba(0,0,0,.46),0 10px 28px rgba(0,0,0,.28)}.slogan .line{display:block;width:max-content;max-width:100%;font-weight:350;white-space:nowrap}.signature{margin-top:.22em;font-size:51px;font-weight:800;margin-left:0}.signature-wide{letter-spacing:1.2em}.menu-stage{position:relative;z-index:2;display:grid;min-height:0;place-items:center end;padding-top:96px}.portal-card{display:grid;width:min(430px,100%);min-height:248px;padding:36px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.88);color:var(--ink);box-shadow:var(--shadow);backdrop-filter:blur(14px);transition:transform .18s ease,background .18s ease,box-shadow .18s ease}.portal-card:hover,.portal-card:focus-visible{transform:translateY(-5px);background:rgba(255,255,255,.96);box-shadow:0 30px 80px rgba(7,28,61,.36);outline:none}.card-kicker{margin:0 0 16px;color:var(--sch-blue);font-size:14px;font-weight:800;letter-spacing:.14em}.portal-card h1{margin:0;font-size:40px;line-height:1.16;letter-spacing:-.02em}.card-copy{margin:18px 0 34px;color:var(--muted);font-size:16px;line-height:1.7}.card-action{display:flex;align-items:center;justify-content:space-between;align-self:end;gap:20px;padding-top:22px;border-top:1px solid #e4eaf2;color:var(--sch-dark);font-size:17px;font-weight:800}.arrow{display:grid;place-items:center;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--sch-blue),var(--sch-sky));color:#fff;font-size:22px}.footer-note{position:absolute;right:72px;bottom:42px;z-index:2;color:rgba(255,255,255,.82);font-size:13px;letter-spacing:.08em}@media(max-width:1180px){.intro{grid-template-columns:minmax(0,1fr) 400px;gap:40px}.brand-logo{width:414px}.slogan{font-size:38px}.signature{font-size:47px}}@media(max-width:860px){.intro{grid-template-columns:1fr;align-items:start;gap:48px;padding:28px 24px 100px}.brand{max-width:none}.logo-row{margin-bottom:52px}.brand-logo{width:min(392px,96vw)}.slogan{max-width:560px;margin-left:0}.slogan .line{white-space:normal}.menu-stage{min-height:auto;padding-top:0;place-items:start center}.footer-note{left:24px;right:24px;text-align:left}}@media(max-width:560px){.intro{background-position:57% center}.logo-row{align-items:flex-start;margin-bottom:42px}.slogan{font-size:34px}.signature{font-size:41px}.portal-card{padding:28px}}
</style>

<main class="intro" aria-label="순천향대학교 부속 구미병원 경영분석 포털 인트로">
<section class="brand" aria-label="병원 브랜드"><div class="logo-row"><img class="brand-logo" src="./sch-gumi-logo-white-clean.png?v=official-logo-8" alt="SCH 순천향대학교 구미병원" /></div><p class="slogan"><span class="line">하늘의 뜻을 받들어</span><span class="line">인술을 펼쳐가는 고향마을</span><strong class="line signature signature-wide">順 天 鄕</strong></p></section>
