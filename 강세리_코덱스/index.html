<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>순천향대학교 부속 구미병원 경영분석 포털</title>
    <style>
      :root {
        --sch-blue: #003d8f;
        --sch-blue-dark: #082f68;
        --sch-sky: #00a6d6;
        --white: #ffffff;
        --ink: #162033;
        --muted: #667085;
        --line: rgba(255, 255, 255, 0.26);
        --shadow: 0 24px 70px rgba(7, 28, 61, 0.28);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
        color: var(--white);
        background: #10213c;
      }

      a { color: inherit; text-decoration: none; }

      .intro {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background-image:
          linear-gradient(90deg, rgba(5, 28, 62, 0.78) 0%, rgba(5, 28, 62, 0.46) 34%, rgba(5, 28, 62, 0.18) 62%, rgba(5, 28, 62, 0.38) 100%),
          linear-gradient(180deg, rgba(7, 23, 48, 0.14), rgba(7, 23, 48, 0.35)),
          url("./gumi-hospital-main.jpg");
        background-size: cover;
        background-position: center;
      }

      .intro::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 34%;
        background: linear-gradient(180deg, rgba(9, 25, 52, 0), rgba(9, 25, 52, 0.54));
        pointer-events: none;
      }

      .brand {
        position: absolute;
        top: clamp(28px, 5vw, 64px);
        left: clamp(28px, 6vw, 84px);
        z-index: 2;
        max-width: 510px;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: clamp(48px, 9vw, 112px);
      }

      .logo-mark {
        display: grid;
        place-items: center;
        width: 76px;
        height: 46px;
        border-radius: 6px;
        background: var(--sch-blue);
        box-shadow: 0 12px 26px rgba(0, 28, 74, 0.28);
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .hospital-name {
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-weight: 700;
        line-height: 1.18;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
      }

      .hospital-name span:first-child { font-size: 15px; letter-spacing: 0.08em; }
      .hospital-name span:last-child { font-size: clamp(19px, 2vw, 26px); }

      .slogan {
        margin: 0;
        font-size: clamp(40px, 5.2vw, 74px);
        font-weight: 300;
        line-height: 1.22;
        letter-spacing: 0;
        text-shadow: 0 8px 32px rgba(0, 0, 0, 0.38);
      }

      .slogan strong { font-weight: 700; }

      .menu-stage {
        position: relative;
        z-index: 2;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 160px 32px 80px;
      }

      .portal-card {
        display: grid;
        width: min(420px, calc(100vw - 48px));
        min-height: 248px;
        padding: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
      }

      .portal-card:hover,
      .portal-card:focus-visible {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 30px 80px rgba(7, 28, 61, 0.36);
        outline: none;
      }

      .card-kicker {
        margin: 0 0 16px;
        color: var(--sch-blue);
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.14em;
      }

      .portal-card h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 42px);
        line-height: 1.16;
        letter-spacing: -0.02em;
      }

      .card-copy {
        margin: 18px 0 34px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .card-action {
        display: flex;
        align-items: center;
        justify-content: space-between;
        align-self: end;
        gap: 20px;
        padding-top: 22px;
        border-top: 1px solid #e4eaf2;
        color: var(--sch-blue-dark);
        font-size: 17px;
        font-weight: 800;
      }

      .arrow {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--sch-blue), var(--sch-sky));
        color: var(--white);
        font-size: 22px;
      }

      .footer-note {
        position: absolute;
        right: clamp(24px, 5vw, 72px);
        bottom: clamp(22px, 4vw, 46px);
        z-index: 2;
        color: rgba(255, 255, 255, 0.82);
        font-size: 13px;
        letter-spacing: 0.08em;
      }

      @media (max-width: 860px) {
        .brand { position: relative; top: auto; left: auto; max-width: none; padding: 28px 24px 0; }
        .logo-row { margin-bottom: 52px; }
        .menu-stage { min-height: auto; padding: 64px 24px 100px; place-items: start center; }
        .footer-note { left: 24px; right: 24px; text-align: left; }
      }

      @media (max-width: 560px) {
        .intro { background-position: 57% center; }
        .logo-row { align-items: flex-start; gap: 14px; margin-bottom: 42px; }
        .logo-mark { width: 64px; height: 40px; font-size: 23px; }
        .portal-card { padding: 28px; }
      }
    </style>
  </head>
  <body>
    <main class="intro" aria-label="순천향대학교 부속 구미병원 경영분석 포털 인트로">
      <section class="brand" aria-label="병원 브랜드">
        <div class="logo-row">
          <div class="logo-mark" aria-hidden="true">SCH</div>
          <div class="hospital-name">
            <span>SCH</span>
            <span>순천향대학교 부속 구미병원</span>
          </div>
        </div>
        <p class="slogan">
          하늘의 뜻을 받들어<br />
          인술을 펼쳐가는<br />
          <strong>고향마을 순천향</strong>
        </p>
      </section>

      <section class="menu-stage" aria-label="포털 메뉴">
        <a class="portal-card" href="./portal.html" aria-label="구미병원 현황 화면으로 이동">
          <p class="card-kicker">MANAGEMENT ANALYTICS PORTAL</p>
          <h1>구미병원 현황</h1>
          <p class="card-copy">주요 경영 지표와 병원 운영 현황을 한 화면에서 확인하는 포털 시안입니다.</p>
          <span class="card-action">
            경영분석 포털 이동
            <span class="arrow" aria-hidden="true">→</span>
          </span>
        </a>
      </section>

      <p class="footer-note">SCH GUMI HOSPITAL BUSINESS ANALYSIS</p>
    </main>
  </body>
</html>
